services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: logicmap
      POSTGRES_PASSWORD: logicmap
      POSTGRES_DB: logicmap
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logicmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-lc"]
    command: "ollama pull nomic-embed-text"
    restart: "no"

  logicmap:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://logicmap:logicmap@postgres:5432/logicmap?sslmode=disable
      REDIS_URL: redis://redis:6379
      EMBEDDING_BACKEND: ollama
      EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_BASE_URL: http://ollama:11434

volumes:
  pg_data:
  ollama_data:
